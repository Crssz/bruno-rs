name: Release

# Build and publish desktop (bruno-rs) + CLI (bru) binaries for Windows and
# macOS. Push a version tag (e.g. `git tag v0.1.0 && git push --tags`) to cut a
# GitHub Release with the archives attached. A manual run (workflow_dispatch)
# builds the same archives and exposes them as downloadable workflow artifacts
# without creating a release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Needed for softprops/action-gh-release to create/edit the release.
permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
          - os: macos-13 # Intel runner
            target: x86_64-apple-darwin
          - os: macos-14 # Apple Silicon runner
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --locked --target ${{ matrix.target }} --bin bruno-rs --bin bru

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME}"
          stage="bruno-rs-${version}-${{ matrix.target }}"
          bin="target/${{ matrix.target }}/release"
          mkdir "$stage"
          cp "$bin/bruno-rs" "$bin/bru" README.md LICENSE "$stage/"
          tar czf "$stage.tar.gz" "$stage"
          shasum -a 256 "$stage.tar.gz" > "$stage.tar.gz.sha256"
          {
            echo "ASSET=$stage.tar.gz"
            echo "CHECKSUM=$stage.tar.gz.sha256"
          } >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME
          $stage = "bruno-rs-$version-${{ matrix.target }}"
          $bin = "target/${{ matrix.target }}/release"
          New-Item -ItemType Directory -Path $stage | Out-Null
          Copy-Item "$bin/bruno-rs.exe", "$bin/bru.exe", README.md, LICENSE $stage
          Compress-Archive -Path $stage -DestinationPath "$stage.zip"
          (Get-FileHash "$stage.zip" -Algorithm SHA256).Hash.ToLower() + "  $stage.zip" |
            Out-File -Encoding ascii "$stage.zip.sha256"
          "ASSET=$stage.zip"          | Out-File -Encoding ascii -Append $env:GITHUB_ENV
          "CHECKSUM=$stage.zip.sha256" | Out-File -Encoding ascii -Append $env:GITHUB_ENV

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.CHECKSUM }}

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{ env.ASSET }}
            ${{ env.CHECKSUM }}
