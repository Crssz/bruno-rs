name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: test (${{ matrix.os }})
    # The desktop app builds on gpui, which has no first-class Linux story
    # (needs X11/Vulkan/Wayland system libs the runners lack) and ships only for
    # Windows + macOS — so CI matches the release targets rather than Ubuntu.
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets
      - name: test
        run: cargo test --workspace
